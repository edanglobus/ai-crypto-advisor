services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-advisor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
      POSTGRES_DB: crypto_advisor
    ports:
      - "5432:5432"
    volumes:
      - crypto_advisor_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto -d crypto_advisor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  crypto_advisor_data:
